<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo | Liceo Pedro Lucas Urribarri</title>
    <style>
        :root {
            --primary: #1E3A5F;
            --primary-dark: #102A43;
            --bg-body: #F8FAFC;
            --text-main: #2D3748;
            --accent: #E63946;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-card {
            background: #FFFFFF;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #E2E8F0;
            text-align: center;
        }

        .login-header h2 {
            color: var(--primary);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .login-header p {
            font-size: 0.85rem;
            color: #718096;
            margin-bottom: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
            margin-bottom: 1.25rem;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            background-color: #F8FAFC;
            border: 1px solid #CBD5E1;
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }

        .btn-login:hover { background-color: var(--primary-dark); }

        .error-message {
            color: var(--accent);
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h2>Control de Acceso</h2>
            <p>U.E. Liceo Bolivariano Pedro Lucas Urribarri</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario Administrador</label>
                <input type="text" id="username" class="form-control" placeholder="Ej. admin_liceo" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Ingresar al Panel</button>
            <div id="errorMsg" class="error-message">⚠️ Usuario o contraseña incorrectos</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // Credenciales temporales de desarrollo
            if (user === "admin" && pass === "12345") {
                // Guardamos una bandera de sesión activa en el navegador
                sessionStorage.setItem('admin_session', 'active');
                errorMsg.style.display = 'none';
                // Redirecciona al panel
                window.location.href = "admin.html";
            } else {
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
